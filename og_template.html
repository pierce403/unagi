<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background-color: #05070D;
      overflow: hidden;
    }
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      color: #f4f8ff;
      font-family: "Avenir Next", "Optima", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(21, 148, 255, 0.18), transparent 26%),
        radial-gradient(circle at 82% 16%, rgba(83, 225, 255, 0.12), transparent 22%),
        linear-gradient(180deg, #08101d 0%, #05070d 52%, #02040a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background:
        radial-gradient(circle at 50% 0%, rgba(83, 225, 255, 0.08), transparent 28%),
        linear-gradient(90deg, transparent 0, rgba(83, 225, 255, 0.03) 50%, transparent 100%);
      filter: blur(20px);
    }
    body::after {
      background:
        repeating-linear-gradient(90deg, transparent 0 39px, rgba(83, 225, 255, 0.03) 39px 40px),
        repeating-linear-gradient(180deg, transparent 0 39px, rgba(83, 225, 255, 0.03) 39px 40px);
      opacity: 0.32;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(10, 79, 222, 0.36), rgba(83, 225, 255, 0.14));
      border: 4px solid rgba(83, 225, 255, 0.22);
      box-shadow: 0 0 60px rgba(21, 148, 255, 0.4);
    }
    .brand-mark svg {
      width: 160px;
      height: 160px;
    }
    h1 {
      margin: 0;
      font-family: "Avenir Next Condensed", "Arial Narrow", "Franklin Gothic Medium", sans-serif;
      font-size: 5rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-shadow: 0 0 40px rgba(21, 148, 255, 0.4);
      color: #ffffff;
    }
    .eyebrow {
      display: inline-block;
      margin-top: -1.5rem;
      padding: 0.6rem 2rem;
      border-radius: 999px;
      border: 2px solid rgba(83, 225, 255, 0.2);
      background: rgba(83, 225, 255, 0.08);
      font-family: "Avenir Next Condensed", "Arial Narrow", "Franklin Gothic Medium", sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #53e1ff;
    }
    p {
      max-width: 900px;
      margin: 0;
      font-size: 2.2rem;
      color: #9cb4d6;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="brand-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Ninja icon">
        <defs>
          <linearGradient id="edge" x1="0%" x2="100%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#53E1FF"/>
            <stop offset="100%" stop-color="#1489FF"/>
          </linearGradient>
          <linearGradient id="maskGrad" x1="0%" x2="0%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#1A2436"/>
            <stop offset="100%" stop-color="#05070D"/>
          </linearGradient>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#53E1FF" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#1489FF" stop-opacity="0"/>
          </radialGradient>
          <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect x="8" y="8" width="112" height="112" rx="28" fill="#05070D" stroke="url(#edge)" stroke-width="4"/>
        <!-- Ninja hood background -->
        <path d="M64 22 C34 22, 22 45, 22 70 C22 100, 38 108, 64 108 C90 108, 106 100, 106 70 C106 45, 94 22, 64 22 Z" fill="#0C1220" stroke="#141C2C" stroke-width="2"/>
        <!-- Face opening mask -->
        <path d="M30 52 C45 44, 83 44, 98 52 C104 55, 106 63, 100 68 C85 78, 43 78, 28 68 C22 63, 24 55, 30 52 Z" fill="#05070D" stroke="#1594FF" stroke-width="1.5" stroke-opacity="0.6"/>
        <!-- Lower mask fabric overlay -->
        <path d="M28 68 C43 78, 85 78, 100 68 C106 74, 102 96, 64 104 C26 96, 22 74, 28 68 Z" fill="url(#maskGrad)"/>
        <!-- Glowing Eyes -->
        <g filter="url(#neon)">
          <!-- Left Eye -->
          <path d="M42 58 L52 61 L44 63 Z" fill="#F4F8FF"/>
          <!-- Right Eye -->
          <path d="M86 58 L76 61 L84 63 Z" fill="#F4F8FF"/>
        </g>
        <!-- Headband trails -->
        <path d="M24 60 C14 55, 6 65, 14 75 C18 80, 24 78, 26 70" fill="none" stroke="#1594FF" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 64 C12 60, 10 75, 18 85" fill="none" stroke="#1594FF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
      </svg>
    </div>
    <h1>UNAGI.NINJA</h1>
    <div class="eyebrow">Stealth Bluetooth Recon</div>
    <p>Local-first Android app for spotting nearby Bluetooth devices, keeping a durable background-free history.</p>
  </div>
</body>
</html>
